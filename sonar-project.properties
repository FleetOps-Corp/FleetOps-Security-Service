sonar.projectKey=FleetOps-Corp_FleetOps-Security-Service
sonar.organization=fleetops-corp
sonar.host.url=https://sonarcloud.io

sonar.sources=api_gateway,auth_service,role_service

# Paths to tests (exclude from main sources)
sonar.tests=api_gateway/tests,auth_service/tests,role_service/tests

# Exclusions to prevent double-indexing
sonar.exclusions=**/tests/**,**/*_test.py,**/test_*.py

# Test files pattern
sonar.test.inclusions=**/tests/**,**/*_test.py,**/test_*.py

sonar.python.coverage.reportPaths=coverage-artifacts/*/coverage.xml

sonar.issue.ignore.paths=e1
sonar.issue.ignore.paths.e1.rule=security:S2115,security:S2068,python:S2068
sonar.issue.ignore.paths.e1.block=**/tests/**